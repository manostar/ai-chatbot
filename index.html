<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>会社AI</title>

<style>

body{
font-family:sans-serif;
margin:0;
}

/* チャットボタン */

#chatButton{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#007aff;
color:white;
font-size:28px;
border:none;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* チャットウィンドウ */

#chatWindow{
position:fixed;
bottom:90px;
right:20px;
width:350px;
height:500px;
background:white;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
display:none;
flex-direction:column;
overflow:hidden;
}

/* ヘッダー */

#chatHeader{
background:#007aff;
color:white;
padding:10px;
font-weight:bold;
}

/* メッセージ */

#messages{
flex:1;
padding:10px;
overflow:auto;
background:#f5f5f5;
}

.message{
margin-bottom:10px;
padding:8px 12px;
border-radius:8px;
max-width:80%;
}

.user{
background:#007aff;
color:white;
margin-left:auto;
}

.ai{
background:#e0e0e0;
}

/* 入力 */

#inputArea{
display:flex;
border-top:1px solid #ddd;
}

#input{
flex:1;
padding:10px;
border:none;
}

#send{
background:#007aff;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- チャットボタン -->

<button id="chatButton">💬</button>

<!-- チャットウィンドウ -->

<div id="chatWindow">

<div id="chatHeader">
日本パワード工業AI
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="input" placeholder="質問してください">
<button id="send">送信</button>
</div>

</div>

<script>

const API="https://ai-chatbot.y-takada-9e1.workers.dev/?q="

const btn=document.getElementById("chatButton")
const win=document.getElementById("chatWindow")

btn.onclick=()=>{
win.style.display=
win.style.display==="flex"?"none":"flex"
}

document.getElementById("send").onclick=send

document.getElementById("input").addEventListener("keypress",e=>{
if(e.key==="Enter") send()
})

async function send(){

const input=document.getElementById("input")
const text=input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

const res=await fetch(API+encodeURIComponent(text))

const data=await res.json()

addMessage("ai",data.reply)

}

function addMessage(role,text){

const div=document.createElement("div")

div.className="message "+role

div.textContent=text

document.getElementById("messages").appendChild(div)

document.getElementById("messages").scrollTop=999999

}

</script>

</body>
</html>
