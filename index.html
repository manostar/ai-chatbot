<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会社専用AI</title>
</head>

<body>

<h1>会社専用AI</h1>

<input id="q" size="40">
<button onclick="ask()">質問</button>

<p id="answer"></p>

<script>

async function ask(){

  const q = document.getElementById("q").value

  document.getElementById("answer").innerText="AI考え中..."

  const res = await fetch(
    "https://ai-chatbot.y-takada-9e1.workers.dev/?q="+encodeURIComponent(q)
  )

  const data = await res.json()

  document.getElementById("answer").innerText=data.reply

}

</script>

</body>
</html>
