<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>会社AI</title>
</head>

<body>

<h2>会社専用AI</h2>

<input id="q" style="width:300px" placeholder="質問してください">
<button onclick="ask()">質問</button>

<pre id="a"></pre>

<script>

async function ask(){

const q = document.getElementById("q").value

const res = await fetch(
"https://ai-chatbot.y-takada-9e1.workers.dev/?q="
+encodeURIComponent(q)
)

const data = await res.json()

document.getElementById("a").innerText = data.reply

}

</script>

</body>
</html>
