<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>日本パワード工業 AIチャット</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
}

#chat{
max-width:700px;
margin:40px auto;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
height:80vh;
}

#messages{
flex:1;
overflow:auto;
padding:20px;
}

.message{
margin-bottom:15px;
padding:10px 14px;
border-radius:10px;
max-width:80%;
}

.user{
background:#007aff;
color:white;
margin-left:auto;
}

.ai{
background:#e9e9eb;
}

#inputArea{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

#input{
flex:1;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007aff;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div id="chat">

<div id="messages"></div>

<div id="inputArea">
<input id="input" placeholder="質問を入力">
<button onclick="send()">送信</button>
</div>

</div>

<script>

const API_KEY = "ここにGeminiAPIキーを貼る";

const COMPANY_DATA = `
あなたは日本パワード工業株式会社のサポートAIです。

会社情報
日本パワード工業株式会社は産業機械や電気機器などの製造・技術サービスを提供する企業です。

主な事業
・産業機械
・電気機器
・技術サービス
・製造支援

会社の問い合わせや製品に関する質問には丁寧に回答してください。

会社と関係ない質問には
「申し訳ありません。このAIは日本パワード工業に関する質問専用です。」
と答えてください。
`;

async function send(){

const input = document.getElementById("input");
const text = input.value;

if(!text) return;

addMessage("user",text);

input.value="";

const prompt = COMPANY_DATA + "\n\nユーザー質問：" + text;

try{

const res = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[{text:prompt}]
}
]
})
});

const data = await res.json();

if(data.error){
addMessage("ai","APIエラー: " + data.error.message);
console.log(data);
return;
}

if(!data.candidates){
addMessage("ai","AIの回答を取得できませんでした");
console.log(data);
return;
}

const reply = data.candidates[0].content.parts[0].text;

addMessage("ai",reply);

}catch(error){

addMessage("ai","通信エラーが発生しました");
console.log(error);

}

}

function addMessage(role,text){

const div = document.createElement("div");

div.className="message "+role;

div.textContent=text;

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;

}

document.getElementById("input").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

</script>

</body>
</html>
